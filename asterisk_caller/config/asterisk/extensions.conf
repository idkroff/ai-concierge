[general]
static=yes
writeprotect=no

[default]
; Диалплан для исходящих звонков
exten => s,1,NoOp(Starting outbound call)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/output)
 same => n,Wait(1)
 same => n,Hangup()

; Альтернативный вариант - проигрывание конкретного файла
exten => _X.,1,NoOp(Call to ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/${AUDIOFILE})
 same => n,Wait(1)
 same => n,Hangup()

[from-trunk]
; Входящие звонки (если нужны) - перенаправляем в ARI приложение
exten => _.,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Stasis(concierge)
 same => n,Hangup()

